name: Plugin Release

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - package.v2.json
      - plugins/**
      - plugins.v2/**
      - .github/scripts/check_plugin_versions.py
      - .github/workflows/release.yml
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to package. Leave empty to use the workflow ref.
        required: false
        default: ""
      plugin_id:
        description: Optional plugin id to package, for example SubtitleManualUpload.
        required: false
        default: ""
      force:
        description: Replace an existing release and tag for the same plugin version.
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq zip

      - name: Check plugin versions
        run: python .github/scripts/check_plugin_versions.py package.json package.v2.json

      - name: Build and release plugins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FILTER_PLUGIN_ID: ${{ inputs.plugin_id || '' }}
          FORCE_RELEASE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail

          : > processed_tags.txt
          target_sha="$(git rev-parse HEAD)"

          plugin_dir_for() {
            local pkg_file="$1"
            local plugin_id_lc="$2"
            local dirs=("plugins.v2/${plugin_id_lc}" "plugins/${plugin_id_lc}")
            if [ "$pkg_file" = "package.json" ]; then
              dirs=("plugins/${plugin_id_lc}" "plugins.v2/${plugin_id_lc}")
            fi
            for candidate in "${dirs[@]}"; do
              if [ -d "$candidate" ]; then
                echo "$candidate"
                return 0
              fi
            done
            return 1
          }

          process_package() {
            local pkg_file="$1"
            [ -f "$pkg_file" ] || return 0

            echo "Processing $pkg_file"
            mapfile -t entries < <(
              jq -r --arg filter "$FILTER_PLUGIN_ID" '
                to_entries
                | map(select(.value.release == true))
                | map(select($filter == "" or .key == $filter))
                | .[]
                | "\(.key)|\(.value.version)"
              ' "$pkg_file"
            )

            if [ "${#entries[@]}" -eq 0 ]; then
              echo "No matching release=true plugins in $pkg_file"
              return 0
            fi

            for entry in "${entries[@]}"; do
              plugin_id="${entry%%|*}"
              plugin_version="${entry##*|}"
              plugin_id_lc="$(echo "$plugin_id" | tr '[:upper:]' '[:lower:]')"

              plugin_dir="$(plugin_dir_for "$pkg_file" "$plugin_id_lc" || true)"
              if [ -z "$plugin_dir" ]; then
                echo "WARN: directory for $plugin_id not found under plugins/ or plugins.v2/, skip."
                continue
              fi

              tag="${plugin_id}_v${plugin_version}"
              asset="${plugin_id_lc}_v${plugin_version}.zip"
              release_notes="$(jq -r --arg plugin_id "$plugin_id" --arg version "v$plugin_version" '.[$plugin_id].history[$version] // empty' "$pkg_file")"
              if [ -z "$release_notes" ]; then
                release_notes="Automated release of $plugin_id $plugin_version"
              fi

              if grep -qxF "$tag" processed_tags.txt; then
                echo "Tag $tag already processed, skip."
                continue
              fi

              if gh release view "$tag" >/dev/null 2>&1; then
                if [ "$FORCE_RELEASE" != "true" ]; then
                  echo "Release $tag already exists; skip. Set force=true to replace it."
                  echo "$tag" >> processed_tags.txt
                  continue
                fi
                echo "Release $tag exists, deleting before replacement."
                gh release delete "$tag" -y
                git push origin :refs/tags/"$tag" || true
              fi

              echo "Packing $plugin_id from $plugin_dir -> $asset"
              rm -f "$asset"
              (
                cd "$(dirname "$plugin_dir")"
                zip -r "$GITHUB_WORKSPACE/$asset" "$(basename "$plugin_dir")" \
                  -x "*/node_modules/*" \
                  -x "*/__pycache__/*" \
                  -x "*.pyc" \
                  -x "*/.pytest_cache/*"
              ) >/dev/null

              echo "Creating release $tag"
              gh release create "$tag" "$asset" \
                --title "$tag" \
                --notes "$release_notes" \
                --target "$target_sha"

              echo "$tag" >> processed_tags.txt
            done
          }

          process_package package.json
          process_package package.v2.json
